<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      .login-container {
        background: white;
        padding: 40px;
        width: 350px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .login-container h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      .message {
        text-align: center;
        color: red;
        margin-bottom: 15px;
      }

      .input-group {
        margin-bottom: 18px;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        transition: border 0.2s;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        background: #667eea;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: background 0.3s;
      }

      button:hover {
        background: #5a67d8;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <h1>Login</h1>

      <div class="message">{{ massage }}</div>

      <form action="/login" method="post">
        <div class="input-group">
          <input type="text" name="username" placeholder="Username" required />
        </div>

        <div class="input-group">
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
        </div>

        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html> a
