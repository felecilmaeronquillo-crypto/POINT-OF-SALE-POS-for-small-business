<!DOCTYPE html>
<html>
<head>
<title>Module 1 - Sales Transaction</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    padding:20px;
}

.container{
    background:white;
    padding:20px;
    width:60%;
    margin:auto;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    border:1px solid gray;
    padding:10px;
    text-align:center;
}

button{
    padding:10px 20px;
    margin-top:15px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

input{
    width:70px;
    padding:5px;
}
</style>

</head>

<body>

<div class="container">

<h1>Sales Transaction</h1>

<table>
<tr>
<th>Product</th>
<th>Price</th>
<th>Stock</th>
<th>Quantity</th>
</tr>

<tr>
<td>Notebook</td>
<td>50</td>
<td>20</td>
<td><input type="number" id="q1" min="0"></td>
</tr>

<tr>
<td>Ballpen</td>
<td>10</td>
<td>50</td>
<td><input type="number" id="q2" min="0"></td>
</tr>

<tr>
<td>Pencil</td>
<td>8</td>
<td>40</td>
<td><input type="number" id="q3" min="0"></td>
</tr>

<tr>
<td>Eraser</td>
<td>5</td>
<td>30</td>
<td><input type="number" id="q4" min="0"></td>
</tr>

<tr>
<td>Marker</td>
<td>25</td>
<td>25</td>
<td><input type="number" id="q5" min="0"></td>
</tr>

<tr>
<td>Ruler</td>
<td>20</td>
<td>35</td>
<td><input type="number" id="q6" min="0"></td>
</tr>

</table>

<br>

Discount %
<input type="number" id="discount" value="0">

<br><br>

Payment
<input type="number" id="payment">

<br>

<button onclick="checkout()">Checkout</button>

<h2 id="result"></h2>

</div>

<script>
const products = [
{name:"Notebook",price:50,stock:20},
{name:"Ballpen",price:10,stock:50},
{name:"Pencil",price:8,stock:40},
{name:"Eraser",price:5,stock:30},
{name:"Marker",price:25,stock:25},
{name:"Ruler",price:20,stock:35}
];

function checkout(){

let items=[];
let subtotal=0;

for(let i=1;i<=6;i++){

let qty=parseInt(document.getElementById("q"+i).value)||0;

if(qty>products[i-1].stock){
alert("Quantity exceeds stock");
return;
}

if(qty>0){

let total=qty*products[i-1].price;

items.push({
name:products[i-1].name,
price:products[i-1].price,
qty:qty,
total:total
});

subtotal+=total;
}
}

if(items.length==0){
alert("Add at least one item");
return;
}

let discount=parseFloat(document.getElementById("discount").value)||0;
let total=subtotal-(subtotal*(discount/100));

let payment=parseFloat(document.getElementById("payment").value)||0;

if(payment<total){
alert("Payment must be complete");
return;
}

let sale={
id:"SALE"+Date.now(),
items:items,
subtotal:subtotal,
discount:discount,
total:total,
payment:payment,
date:new Date().toLocaleString()
};

localStorage.setItem("latestSale",JSON.stringify(sale));

let history=JSON.parse(localStorage.getItem("salesHistory"))||[];
history.push(sale);

localStorage.setItem("salesHistory",JSON.stringify(history));

document.getElementById("result").innerHTML="Total: "+total;

window.location="module2.html";

}
</script>

</body>
</html>
